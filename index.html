<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        #error-display {
            display: none;
            background: #fee2e2;
            color: #b91c1c;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            max-width: 90%;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div id="app" class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">アプリが正常に起動しました</h1>
        <p class="text-gray-600 mb-6">GitHub Pagesでの表示を確認できました。</p>
        
        <div id="content" class="space-y-4">
            <button onclick="changeColor()" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-full transition-colors">
                背景色を変える
            </button>
            <p id="counter-text" class="text-sm text-gray-400">クリック数: 0</p>
        </div>
    </div>

    <!-- 万が一JavaScriptでエラーが出た時に表示されるエリア -->
    <div id="error-display">
        <strong>エラーが発生しました:</strong>
        <p id="error-message"></p>
    </div>

    <script>
        // エラーハンドリング: 真っ白になるのを防ぐためにログを表示
        window.onerror = function(msg, url, line) {
            const errorDisplay = document.getElementById('error-display');
            const errorMsg = document.getElementById('error-message');
            errorDisplay.style.display = 'block';
            errorMsg.innerText = msg + " (Line: " + line + ")";
            return false;
        };

        let count = 0;

        function changeColor() {
            count++;
            const colors = ['#eff6ff', '#f0fdf4', '#fff7ed', '#faf5ff', '#fff1f2'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.backgroundColor = randomColor;
            
            document.getElementById('counter-text').innerText = "クリック数: " + count;
            
            console.log("Color changed to: " + randomColor);
        }

        // 起動時に実行
        window.onload = function() {
            console.log("App initialized.");
        };
    </script>
</body>
</html>
